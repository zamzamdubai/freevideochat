<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

<title>Private Access</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
    -webkit-tap-highlight-color: transparent;
}

body {
    background: #000;
    color: #fff;
}

/* VIDEO BACKGROUND */
.video-bg {
    position: fixed;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -2;
}

.overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: linear-gradient(rgba(0,0,0,0.7), rgba(20,0,30,0.9));
    z-index: -1;
}

/* HERO */
.hero {
    text-align: center;
    padding: 30px 15px;
}

.hero h1 {
    font-size: 2rem;
    background: linear-gradient(45deg, #ff007a, #ff2a00);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    color: transparent;
}

/* BUTTONS */
.btn {
    margin-top: 15px;
    padding: 12px 26px;
    border-radius: 30px;
    border: none;
    background: linear-gradient(45deg, #ff007a, #ff2a00);
    color: #fff;
    font-family: 'Poppins', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    box-shadow: 0 0 25px rgba(255,0,122,0.7);
    display: inline-block;
    text-decoration: none;
}

/* HELP VIDEO BUTTON */
.btn-help {
    margin-top: 11px;
    padding: 12px 26px;
    border-radius: 30px;
    border: 1.5px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.07);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    color: #fff;
    font-family: 'Poppins', sans-serif;
    font-size: 0.95rem;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: fit-content;
    margin-left: auto;
    margin-right: auto;
    transition: background 0.2s;
}
.btn-help:hover { background: rgba(255,255,255,0.14); }
.btn-help:active { transform: scale(0.97); }


/* CHAT */
.chat {
    margin: 20px auto;
    width: 95%;
    max-width: 340px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(15px);
    padding: 15px;
    border-radius: 15px;
}

.msg {
    margin: 8px 0;
    padding: 8px 12px;
    border-radius: 12px;
    max-width: 80%;
    font-size: 0.85rem;
}

.left { background: rgba(255,255,255,0.1); }
.right {
    background: linear-gradient(45deg, #ff007a, #ff2a00);
    margin-left: auto;
}

/* TRENDING */
.trending {
    text-align: center;
    padding: 30px 10px;
}

.trending h2 {
    margin-bottom: 20px;
}

/* ROW */
.trend-row {
    display: flex;
    justify-content: center;
    gap: 10px;
    overflow-x: auto;
    padding-bottom: 10px;
    -webkit-overflow-scrolling: touch;
}

/* CARD */
.trend-card {
    min-width: 110px;
    height: 190px;
    border-radius: 15px;
    overflow: hidden;
    position: relative;
    flex-shrink: 0;
    box-shadow: 0 0 25px rgba(255,0,122,0.25);
    transition: 0.3s;
}

/* MEDIA */
.trend-card img,
.trend-card video {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.trend-card:hover {
    transform: scale(1.05);
    box-shadow: 0 0 40px rgba(255,0,122,0.6);
}



/* ══════════════════════════════
   HELP VIDEO MODAL
══════════════════════════════ */
.modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.88);
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    opacity: 0;
    pointer-events: none;
    transition: opacity .28s ease;
}
.modal-overlay.open {
    opacity: 1;
    pointer-events: all;
}

.modal-box {
    background: #0e0010;
    border: 1px solid rgba(255,0,122,0.28);
    border-radius: 20px;
    width: 100%;
    max-width: 420px;
    overflow: hidden;
    box-shadow: 0 0 55px rgba(255,0,122,0.28);
    transform: translateY(28px) scale(0.96);
    transition: transform .28s ease;
}
.modal-overlay.open .modal-box {
    transform: translateY(0) scale(1);
}

.modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px 10px;
    border-bottom: 1px solid rgba(255,255,255,0.07);
}
.modal-header h3 {
    font-size: 0.94rem;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
}
.modal-close {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.06);
    color: #fff;
    font-size: 1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background .2s;
    flex-shrink: 0;
}
.modal-close:hover { background: rgba(255,0,122,0.35); }

.modal-video-wrap {
    width: 100%;
    aspect-ratio: 16/9;
    background: #000;
}
.modal-video-wrap video {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
}

.modal-footer {
    padding: 12px 16px;
    font-size: 0.76rem;
    color: rgba(255,255,255,0.42);
    text-align: center;
    line-height: 1.6;
}
.modal-footer a {
    color: #25D366;
    font-weight: 600;
    text-decoration: none;
}
</style>

</head>

<body>

<!-- VIDEO BG -->
<video autoplay muted loop playsinline class="video-bg">
    <source src="vid_bg.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<!-- HERO -->
<section class="hero">
    <h1>🔥 Private Access</h1>

 <!-- DOWNLOAD BUTTON -->
    <a href="https://github.com/zamzamdubai/freevideochat/releases/download/freechat/Azhar.apk" target="_blank" rel="noopener noreferrer">
        <button class="btn">🔥 Download Our App</button>
    </a>
	
    <br>

    <!-- HELP VIDEO BUTTON -->
    <button class="btn-help" onclick="openHelpModal()">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="12" r="10" stroke="white" stroke-width="1.8"/>
            <polygon points="10,8 16,12 10,16" fill="white"/>
        </svg>
        📲 How to Download &amp; Install
    </button>



    <div class="chat" id="chatBox"></div>
</section>

<!-- TRENDING -->
<section class="trending">
    <h2>🔥 Trending Now</h2>

    <div class="trend-row">

        <div class="trend-card"><img src="2.jpg"></div>
        <div class="trend-card">
            <video autoplay muted loop playsinline>
                <source src="mid.mp4" type="video/mp4">
            </video>
        </div>
        <div class="trend-card"><img src="3.jpg"></div>

    </div>
</section>



<!-- ══ HELP VIDEO MODAL ══ -->
<div class="modal-overlay" id="helpModal" onclick="overlayClick(event)">
    <div class="modal-box">

        <div class="modal-header">
            <h3>
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none">
                    <circle cx="12" cy="12" r="10" stroke="#ff007a" stroke-width="1.8"/>
                    <polygon points="10,8 16,12 10,16" fill="#ff007a"/>
                </svg>
                📲 How to Download &amp; Install
            </h3>
            <button class="modal-close" onclick="closeHelpModal()">✕</button>
        </div>

        <div class="modal-video-wrap">
            <video id="helpVideo" controls playsinline preload="metadata">
                <source src="help.mp4" type="video/mp4">
            </video>
        </div>

        <div class="modal-footer">
            Koi masla ho tou &nbsp;
            <a href="https://wa.me/923001234567?text=App+install+mein+masla+aa+raha+hai"
               target="_blank">WhatsApp pe message karo 💬</a>
        </div>

    </div>
</div>

<script>
/* ── CHAT ANIMATION ── */
const chatData = [
    {text: "Hey… you opened something you won't forget 😏", side: "left"},
    {text: "What's inside?", side: "right"},
    {text: "Something addictive… once you start, you won't stop 🔥", side: "left"},
    {text: "Now I'm curious", side: "right"},
    {text: "Tap download… I'll show you everything 💋", side: "left"}
];

let i = 0;
function typeChat() {
    if (i >= chatData.length) return;
    const chatBox = document.getElementById("chatBox");
    const msg = document.createElement("div");
    msg.className = "msg " + chatData[i].side;
    const text = chatData[i].text;
    let j = 0;
    const typing = setInterval(() => {
        msg.textContent += text[j];
        j++;
        if (j >= text.length) {
            clearInterval(typing);
            i++;
            setTimeout(typeChat, 500);
        }
    }, 25);
    chatBox.appendChild(msg);
}
window.onload = () => { setTimeout(typeChat, 600); };

/* ── MODAL OPEN / CLOSE ── */
function openHelpModal() {
    document.getElementById("helpModal").classList.add("open");
    document.body.style.overflow = "hidden";
    document.getElementById("helpVideo").play();
}

function closeHelpModal() {
    document.getElementById("helpModal").classList.remove("open");
    document.body.style.overflow = "";
    const v = document.getElementById("helpVideo");
    v.pause();
    v.currentTime = 0;
}

/* tap outside modal box = close */
function overlayClick(e) {
    if (e.target === document.getElementById("helpModal")) closeHelpModal();
}

/* Android back button closes modal */
window.addEventListener("popstate", closeHelpModal);
</script>

</body>
</html>
